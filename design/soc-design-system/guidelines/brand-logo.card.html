<!-- @dsCard group="Brand" viewport="700x200" name="Logo & iconography" subtitle="🔥 flame mark + emoji as the icon system" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--fw-bg);font-family:var(--fw-font-ui);color:var(--fw-t1);padding:0}
  .header{background:linear-gradient(180deg,#111827,var(--fw-bg));border-bottom:1px solid var(--fw-border);padding:14px 24px;display:flex;align-items:center;gap:12px}
  .logo{font-size:24px}
  .title{font-size:20px;font-weight:700;color:var(--fw-accent)}
  .title span{color:var(--fw-t2);font-weight:400}
  .icons{display:flex;gap:6px;flex-wrap:wrap;padding:20px 24px}
  .ico{width:46px;height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--fw-bg-card);border:1px solid var(--fw-border);border-radius:8px;font-size:18px}
  .cap{font-size:8px;color:var(--fw-t3);font-family:var(--fw-font-ui)}
</style></head>
<body>
  <div class="header"><span class="logo">🔥</span><span class="title">FireWatch <span>AI</span></span></div>
  <div class="icons">
    <div class="ico">📊<span class="cap">stats</span></div>
    <div class="ico">🛡️<span class="cap">blocked</span></div>
    <div class="ico">🌐<span class="cap">ips</span></div>
    <div class="ico">🤖<span class="cap">ai</span></div>
    <div class="ico">🧠<span class="cap">summary</span></div>
    <div class="ico">🎯<span class="cap">actors</span></div>
    <div class="ico">⚡<span class="cap">recs</span></div>
    <div class="ico">📈<span class="cap">timeline</span></div>
    <div class="ico">🔬<span class="cap">deep</span></div>
    <div class="ico">🌍<span class="cap">geo</span></div>
    <div class="ico">☁️<span class="cap">azure</span></div>
    <div class="ico">⚙️<span class="cap">settings</span></div>
  </div>
</body></html>
