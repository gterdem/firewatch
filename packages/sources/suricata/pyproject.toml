[project]
name = "firewatch-suricata"
version = "0.1.0"
description = "FireWatch Suricata source plugin — reference PullSource implementation."
requires-python = ">=3.12"
dependencies = [
    "firewatch-sdk",
    "pydantic>=2.0",
    "asyncssh>=2.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/firewatch_suricata"]

[project.entry-points."firewatch.sources"]
suricata = "firewatch_suricata.plugin:SuricataSource"
