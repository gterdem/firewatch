[project]
name = "firewatch-clamav"
version = "0.1.0"
description = "FireWatch ClamAV source plugin — local malware detection (journald-first, file-tail fallback)."
requires-python = ">=3.12"
dependencies = [
    "firewatch-sdk",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/firewatch_clamav"]

[project.entry-points."firewatch.sources"]
clamav = "firewatch_clamav.plugin:ClamAVSource"
