name: ci
# Runs on PRs AND on every push to main. The push trigger is what makes main's
# health a fact rather than an assumption: a PR's checks run against a PREDICTED
# merge (your branch spliced into main as it looked at that moment), and nothing
# re-checks that prediction once main moves. Only a run on main tests what main
# actually became — catching semantic conflicts between two independently-green
# PRs, and any direct push.
# Without this, breakage sits on main unmeasured: test_ns6 hung for 29 days while
# gitleaks.yml (which does watch main) caught its leak within a minute.
on:
  pull_request:
    paths:
      - 'packages/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    # Same filter as above — ADR-0028 D3 (a Python change does not run Node) holds
    # for pushes exactly as it does for PRs.
    paths:
      - 'packages/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
jobs:
  # Python quality gates — ruff + pyright + pytest.
  # ADR-0028 D3: this job is path-filtered to packages/**; the frontend job lives
  # in ci-frontend.yml and is path-filtered to frontend/**. The two jobs are peers.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-packages
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run pytest
