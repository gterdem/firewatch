[project]
name = "firewatch-sdk"
version = "0.1.0"
description = "FireWatch SDK — canonical data models and port protocols shared by core and every source plugin."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/firewatch_sdk"]
