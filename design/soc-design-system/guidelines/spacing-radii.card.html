<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="Tight, consistent rounding — 10px cards down to 3px bars" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--fw-bg);font-family:var(--fw-font-ui);padding:18px}
  .row{display:flex;gap:18px;align-items:flex-end}
  .item{text-align:center}
  .box{width:70px;height:54px;background:var(--fw-bg-input);border:1px solid var(--fw-border-l)}
  .name{font-size:10px;color:var(--fw-t2);margin-top:6px;font-weight:600}
  .val{font-size:10px;color:var(--fw-t3);font-family:var(--fw-font-mono)}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">pill</div><div class="val">16px</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="name">card</div><div class="val">10px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">md</div><div class="val">8px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="val">6px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">xs</div><div class="val">4px</div></div>
    <div class="item"><div class="box" style="border-radius:3px"></div><div class="name">bar</div><div class="val">3px</div></div>
  </div>
</body></html>
