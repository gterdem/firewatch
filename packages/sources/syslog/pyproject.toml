[project]
name = "firewatch-syslog"
version = "0.1.0"
description = "FireWatch Syslog source plugin — reference PushSource implementation."
requires-python = ">=3.12"
dependencies = [
    "firewatch-sdk",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/firewatch_syslog"]

[project.entry-points."firewatch.sources"]
syslog = "firewatch_syslog.plugin:SyslogSource"
