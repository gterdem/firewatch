[project]
name = "firewatch-cli"
version = "0.1.0"
description = "FireWatch CLI — runtime entrypoint (run/sync/serve) and developer tools (new-source). MA.5 + MA.6."
requires-python = ">=3.12"
dependencies = [
    "firewatch-sdk",
    "firewatch-core",
    "firewatch-api",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/firewatch_cli"]

[project.scripts]
firewatch = "firewatch_cli.main:main"
