<!-- @dsCard group="Colors" viewport="700x170" name="Brand & functional hues" subtitle="Amber signature + the SOC signal palette" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--fw-bg);font-family:var(--fw-font-ui);padding:18px}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  .sw{text-align:center}
  .chip{height:50px;border-radius:8px;border:1px solid var(--fw-border)}
  .name{font-size:10px;color:var(--fw-t2);font-weight:600;margin-top:5px}
  .hex{font-size:9px;color:var(--fw-t3);font-family:var(--fw-font-mono)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--fw-accent)"></div><div class="name">accent</div><div class="hex">f59e0b</div></div>
    <div class="sw"><div class="chip" style="background:var(--fw-red)"></div><div class="name">red</div><div class="hex">ef4444</div></div>
    <div class="sw"><div class="chip" style="background:var(--fw-orange)"></div><div class="name">orange</div><div class="hex">f97316</div></div>
    <div class="sw"><div class="chip" style="background:var(--fw-blue)"></div><div class="name">blue</div><div class="hex">3b82f6</div></div>
    <div class="sw"><div class="chip" style="background:var(--fw-green)"></div><div class="name">green</div><div class="hex">22c55e</div></div>
    <div class="sw"><div class="chip" style="background:var(--fw-purple)"></div><div class="name">purple</div><div class="hex">a855f7</div></div>
    <div class="sw"><div class="chip" style="background:var(--fw-cyan)"></div><div class="name">cyan</div><div class="hex">06b6d4</div></div>
    <div class="sw"><div class="chip" style="background:var(--fw-pink)"></div><div class="name">pink</div><div class="hex">ec4899</div></div>
  </div>
</body></html>
