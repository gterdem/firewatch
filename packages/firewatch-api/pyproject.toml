[project]
name = "firewatch-api"
version = "0.1.0"
description = "FireWatch REST API — discovery, config, and read endpoints. Consumer of firewatch-core and firewatch-sdk; never imported by either."
requires-python = ">=3.12"
dependencies = [
    "firewatch-sdk",
    "firewatch-core",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/firewatch_api"]
