[project]
name = "firewatch-core"
version = "0.1.0"
description = "FireWatch core — plugin loader, pipeline, and shared scoring/detection/normalize helpers."
requires-python = ">=3.12"
dependencies = [
    "firewatch-sdk",
    "pydantic>=2.0",
    "aiosqlite>=0.20",
    "httpx>=0.27",
    "maxminddb>=3.1.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/firewatch_core"]
