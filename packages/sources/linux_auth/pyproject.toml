[project]
name = "firewatch-linux-auth"
version = "0.1.0"
description = "FireWatch Linux auth & intrusion signals source plugin — local (journald-first) PullSource."
requires-python = ">=3.12"
dependencies = [
    "firewatch-sdk",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/firewatch_linux_auth"]

[project.entry-points."firewatch.sources"]
linux_auth = "firewatch_linux_auth.plugin:LinuxAuthSource"
