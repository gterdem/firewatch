name: ci-frontend
# Runs on PRs AND on every push to main — see the rationale in ci.yml. A PR's
# checks test a predicted merge; only a run on main tests what main became.
on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  push:
    branches: [main]
    # Same filter as above — ADR-0028 D3 (a frontend change does not run pytest)
    # holds for pushes exactly as it does for PRs.
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
concurrency:
  group: ci-frontend-${{ github.head_ref || github.ref }}
  # Cancel superseded runs on PRs (only the latest push matters), but NEVER on
  # main: every commit there needs its own verdict. Cancelling would leave gaps
  # in main's history — and a commit with no verdict is indistinguishable from a
  # green one, which is the exact ambiguity this push trigger exists to remove.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  # Frontend quality gates — eslint + tsc --noEmit + vitest.
  # ADR-0028 D3: path-filtered to frontend/**; peer to the Python quality job in ci.yml.
  # A Python-only change does not trigger this job; a frontend-only change does not
  # trigger the Python job.
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
