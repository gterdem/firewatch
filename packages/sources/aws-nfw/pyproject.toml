[project]
name = "firewatch-aws-nfw"
version = "0.1.0"
description = "FireWatch AWS Network Firewall source plugin — PullSource over CloudWatch Logs."
requires-python = ">=3.12"
dependencies = [
    "firewatch-sdk",
    "pydantic>=2.0",
    "boto3>=1.34",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/firewatch_aws_nfw"]

[project.entry-points."firewatch.sources"]
aws_network_firewall = "firewatch_aws_nfw.plugin:AwsNetworkFirewallSource"
