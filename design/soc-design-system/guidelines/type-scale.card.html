<!-- @dsCard group="Type" viewport="700x230" name="UI text scale" subtitle="Segoe UI / system stack — the interface voice" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--fw-bg-card);font-family:var(--fw-font-ui);color:var(--fw-t1);padding:20px}
  .line{display:flex;align-items:baseline;gap:14px;padding:5px 0;border-bottom:1px solid var(--fw-border)}
  .line:last-child{border:none}
  .tok{margin-left:auto;font-size:10px;font-family:var(--fw-font-mono);color:var(--fw-t3);white-space:nowrap}
  .upper{text-transform:uppercase;letter-spacing:.8px;color:var(--fw-t3)}
</style></head>
<body>
  <div class="line"><span style="font-size:20px;font-weight:700;color:var(--fw-accent)">FireWatch <span style="color:var(--fw-t2);font-weight:400">AI</span></span><span class="tok">20px / 700 · h1 logo</span></div>
  <div class="line"><span style="font-size:16px;font-weight:600">Drill-down: 203.0.113.10</span><span class="tok">16px / 600 · modal h2</span></div>
  <div class="line"><span style="font-size:14px;font-weight:600">Attack categories</span><span class="tok">14px / 600 · panel h3</span></div>
  <div class="line"><span style="font-size:13px;color:var(--fw-t2)">Body copy and form input text sits at 13px.</span><span class="tok">13px / 400 · body</span></div>
  <div class="line"><span style="font-size:12px;color:var(--fw-t2)">Table cells &amp; secondary copy</span><span class="tok">12px · sm</span></div>
  <div class="line"><span class="upper" style="font-size:10px">Table head · badge · label</span><span class="tok">10px · upper, +0.5</span></div>
</body></html>
