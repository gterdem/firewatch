# nginx configuration for FireWatch.
#
# Topology: nginx runs in the firewatch container's network namespace
# (network_mode: service:firewatch in docker-compose.yml).  This means:
# - nginx listens on :80 inside the SHARED namespace.
# - The host port (default 8080) is published on the `firewatch` service.
# - The FireWatch API is reachable at 127.0.0.1:8000 because both processes
#   share the same loopback interface.
# - The API never opens a non-loopback socket → ADR-0026 bind guard passes
#   with no API key required.
#
# Route logic:
# - API path prefixes are proxied to 127.0.0.1:8000 (mirrored from
#   frontend/vite.config.ts so dev and production behave identically).
# - Everything else (SPA routes, static assets) is served from /usr/share/nginx/html
#   with a try_files $uri /index.html fallback for client-side routing.
#
# API prefixes (from frontend/vite.config.ts, as of MI-3):
#   /sources  /config  /stats  /health  /threats  /logs
#   /analytics  /sync  /rules  /ai
# The /ingest prefix is present in the API (POST /logs, POST /logs/batch)
# but NOT in vite.config.ts (ingest is a machine-to-machine push path, not
# called from the browser SPA).  It IS proxied here for completeness so
# curl-based ingest calls work through the nginx surface.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Disable nginx version disclosure.
    server_tokens off;

    # Hardening response headers (OWASP: Secure Headers Project).
    # 'unsafe-inline' is required for Vite's built SPA output (inline styles
    # and scripts in the compiled bundle).  font-src includes data: for
    # base64-encoded fonts that some UI icon sets embed.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'" always;

    # Upstream — the loopback-bound FireWatch API (shared netns).
    upstream firewatch_api {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ----------------------------------------------------------------
        # API proxy locations — forwarded to the loopback FireWatch API.
        # Each prefix matches the exact set from frontend/vite.config.ts.
        # ----------------------------------------------------------------

        location /sources {
            proxy_pass http://firewatch_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /config {
            proxy_pass http://firewatch_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /stats {
            proxy_pass http://firewatch_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://firewatch_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /threats {
            proxy_pass http://firewatch_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /logs {
            proxy_pass http://firewatch_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /analytics {
            proxy_pass http://firewatch_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /sync {
            proxy_pass http://firewatch_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /rules {
            proxy_pass http://firewatch_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ai {
            proxy_pass http://firewatch_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /ingest is a machine-to-machine push path (not in vite.config.ts
        # proxy but exposed here for curl/agent-based ingest via nginx).
        location /ingest {
            # Bound the body size on the only network-exposed write path.
            # 4m covers the expected max batch size; larger payloads are rejected
            # with 413 before reaching the application.
            client_max_body_size 4m;
            proxy_pass http://firewatch_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------------------------------
        # SPA fallback — all other paths serve index.html so client-side
        # routing (React Router) handles navigation.
        # ----------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
