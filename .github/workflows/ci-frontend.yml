name: ci-frontend
on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
concurrency:
  group: ci-frontend-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
jobs:
  # Frontend quality gates — eslint + tsc --noEmit + vitest.
  # ADR-0028 D3: path-filtered to frontend/**; peer to the Python quality job in ci.yml.
  # A Python-only change does not trigger this job; a frontend-only change does not
  # trigger the Python job.
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
