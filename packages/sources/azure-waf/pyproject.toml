[project]
name = "firewatch-azure-waf"
version = "0.1.0"
description = "FireWatch Azure WAF source plugin — PullSource over Log Analytics KQL."
requires-python = ">=3.12"
dependencies = [
    "firewatch-sdk",
    "pydantic>=2.0",
    "azure-monitor-query>=1.2",
    "azure-identity>=1.15",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/firewatch_azure_waf"]

[project.entry-points."firewatch.sources"]
azure_waf = "firewatch_azure_waf.plugin:AzureWAFSource"
